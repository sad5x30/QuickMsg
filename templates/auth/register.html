<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>QuickMsg</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{{ url_for('static', path='styles/style.css') }}?v=20260331a" rel="stylesheet">
    <script>
        (function () {
            const savedTheme = localStorage.getItem("quickmsg-theme");

            if (savedTheme === "dark") {
                document.documentElement.classList.add("dark-theme");
            }
        })();
    </script>
</head>
<body>
    <div class="page-shell">
        <header>
            <div class="menu">
                <div class="brand-block">
                    <div class="brand-name">QuickMsg | Registration</div>
                    <p class="brand-copy">Создайте аккаунт и начните переписку за пару секунд.</p>
                </div>

                <div class="back-buttons">
                    <a href="/" class="nav-link">Вернуться</a>
                </div>
            </div>
        </header>

        <section class="hero-section">
            <div class="hero-card">
                <div class="hero-copy">
                    <span class="eyebrow">New account</span>
                    <h1>Зарегистрируйтесь и откройте QuickMsg</h1>
                    <p>После регистрации вы сможете искать пользователей и вести личные диалоги.</p>
                </div>

                <div class="auth-card">
                    <form method="post" class="auth-form">
                        <label for="username">Имя пользователя</label>
                        <input id="username" type="text" name="username" placeholder="Придумайте имя пользователя" required>
                        <label for="password">Пароль</label>
                        <input id="password" type="password" name="password" placeholder="Придумайте пароль" required>
                        <button type="submit" class="submit-button">Создать аккаунт</button>
                    </form>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
