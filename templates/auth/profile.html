<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>QuickMsg | Профиль</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{{ url_for('static', path='styles/style.css') }}?v=20260407a" rel="stylesheet">
    <script>
        (function () {
            const savedTheme = localStorage.getItem("quickmsg-theme");

            if (savedTheme === "dark") {
                document.documentElement.classList.add("dark-theme");
            }
        })();
    </script>
</head>
<body>
    <div class="page-shell">
        <header>
            <div class="menu">
                <div class="brand-block">
                    <div class="brand-name">QuickMsg | Профиль</div>
                    <p class="brand-copy">Данные вашего аккаунта и быстрые действия.</p>
                </div>

                <div class="auth-buttons">
                    <a href="/" class="nav-link">Главная</a>
                    <a href="/logout" class="nav-link">Выйти</a>
                    <button id="swap-button" type="button" aria-label="Переключить тему">🌙</button>
                </div>
            </div>
        </header>

        <section class="hero-section">
            <div class="hero-card">
                <div class="hero-copy">
                    <span class="eyebrow">Account</span>
                    <h1>Ваш профиль</h1>
                    <p>Здесь отображается основная информация об аккаунте.</p>
                </div>

                <div class="auth-card">
                    <div class="auth-form">
                        <label>Имя пользователя</label>
                        <input type="text" value="{{ current_user.username }}" readonly>

                        <label>ID пользователя</label>
                        <input type="text" value="{{ current_user.id }}" readonly>

                        <label>Дата регистрации</label>
                        <input type="text" value="{{ current_user.created_at.strftime('%d.%m.%Y %H:%M') if current_user.created_at else '—' }}" readonly>

                        <a href="/" class="submit-button" style="text-align: center; text-decoration: none;">Перейти к чатам</a>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        (function () {
            const swapButton = document.getElementById("swap-button");

            function syncThemeButton() {
                if (!swapButton) {
                    return;
                }

                const isDarkTheme = document.documentElement.classList.contains("dark-theme");
                swapButton.textContent = isDarkTheme ? "☀️" : "🌙";
                swapButton.setAttribute(
                    "aria-label",
                    isDarkTheme ? "Переключить на светлую тему" : "Переключить на темную тему"
                );
            }

            syncThemeButton();

            if (!swapButton) {
                return;
            }

            swapButton.addEventListener("click", function () {
                const nextIsDarkTheme = !document.documentElement.classList.contains("dark-theme");
                document.documentElement.classList.toggle("dark-theme", nextIsDarkTheme);
                localStorage.setItem("quickmsg-theme", nextIsDarkTheme ? "dark" : "light");
                syncThemeButton();
            });
        })();
    </script>
</body>
</html>
