<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>QuickMsg | Профиль</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{{ url_for('static', path='styles/style.css') }}?v=20260407a" rel="stylesheet">
    <script>
        (function () {
            const savedTheme = localStorage.getItem("quickmsg-theme");

            if (savedTheme === "dark") {
                document.documentElement.classList.add("dark-theme");
            }
        })();
    </script>
</head>
<body>
    <div class="page-shell">
        <header>
            <div class="menu">
                <div class="brand-block">
                    <div class="brand-name"><a href="/">QuickMsg</a> | Профиль</div>
                    <p class="brand-copy">Данные вашего аккаунта и быстрые действия.</p>
                </div>

                <div class="auth-buttons">
                    <a href="/" class="nav-link">Главная</a>
                    <a href="/logout" class="nav-link">Выйти</a>
                    <button id="swap-button" type="button" aria-label="Переключить тему">🌙</button>
                </div>
            </div>
        </header>

        <section class="hero-section">
            <div class="hero-card">
                <div class="hero-copy">
                    <span class="eyebrow">Account</span>
                    <h1>Ваш профиль</h1>
                    <p>Здесь отображается основная информация об аккаунте.</p>

                    <div class="profile-avatar-section">
                        {% if current_user.avatar_url %}
                            <img
                                src="{{ current_user.avatar_url }}"
                                alt="Аватар {{ current_user.username }}"
                                class="profile-avatar-preview"
                                width="120"
                                height="120"
                                loading="lazy"
                                decoding="async"
                            >
                        {% else %}
                            <div class="profile-avatar-fallback">
                                {{ current_user.username[0] | upper }}
                            </div>
                        {% endif %}

                        <form
                            method="post"
                            action="/profile/avatar"
                            enctype="multipart/form-data"
                            class="avatar-upload-form"
                        >
                            <label for="avatar">Аватар</label>
                            <input
                                id="avatar"
                                name="avatar"
                                type="file"
                                accept="image/png,image/jpeg,image/webp,image/gif"
                                required
                            >
                            <button type="submit" class="submit-button">Загрузить аватар</button>
                        </form>
                    </div>
                </div>

                <div class="auth-card">
                    <div class="auth-form">
                        <label>Имя пользователя</label>
                        <input type="text" value="{{ current_user.username }}" readonly>

                        <label>ID пользователя</label>
                        <input type="text" value="{{ current_user.id }}" readonly>

                        <label>Дата регистрации</label>
                        <input type="text" value="{{ current_user.created_at.strftime('%d.%m.%Y %H:%M') if current_user.created_at else '—' }}" readonly>

                        <a href="/" class="submit-button profile-open-chat-link">Перейти к чатам</a>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        (function () {
            const swapButton = document.getElementById("swap-button");

            function syncThemeButton() {
                if (!swapButton) {
                    return;
                }

                const isDarkTheme = document.documentElement.classList.contains("dark-theme");
                swapButton.textContent = isDarkTheme ? "☀️" : "🌙";
                swapButton.setAttribute(
                    "aria-label",
                    isDarkTheme ? "Переключить на светлую тему" : "Переключить на темную тему"
                );
            }

            syncThemeButton();

            if (!swapButton) {
                return;
            }

            swapButton.addEventListener("click", function () {
                const nextIsDarkTheme = !document.documentElement.classList.contains("dark-theme");
                document.documentElement.classList.toggle("dark-theme", nextIsDarkTheme);
                localStorage.setItem("quickmsg-theme", nextIsDarkTheme ? "dark" : "light");
                syncThemeButton();
            });
        })();
    </script>
</body>
</html>
